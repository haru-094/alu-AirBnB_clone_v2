<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>AirBnB clone</title>
        <link rel="stylesheet" type="text/css" href="styles/4-common.css" />
        <link rel="stylesheet" type="text/css" href="styles/3-header.css" />
        <link rel="stylesheet" type="text/css" href="styles/3-footer.css" />
        <link rel="stylesheet" type="text/css" href="styles/6-filters.css" />
        <link rel="stylesheet" type="text/css" href="styles/8-places.css" />
    </head>
    <body>
        <header>
            <div class="logo_cell">
                <img src="images/logo.png" alt="HBNB Logo" />
            </div>
        </header>
        <div id="main">
            <div class="search_bar">
                <div class="locations_filters">
                    <h3>States &amp; Cities</h3>
                    <h4>Location</h4>
                </div>
                <div class="amenities_filters">
                    <h3>Amenities</h3>
                </div>
                <div class="button_search">
                    <button type="button">Search</button>
                </div>
            </div>
            <div class="places_section">
                <h1>Places</h1>
                <div class="places">
                    <article>
                        <div class="title_box">
                            <h2>Place name</h2>
                            <div class="price_by_night">$0</div>
                        </div>
                        <div class="information">
                            <div class="max_guest">0 Guest</div>
                            <div class="number_rooms">0 Bedroom</div>
                            <div class="number_bathrooms">0 Bathroom</div>
                        </div>
                        <div class="description">
                        </div>
                    </article>
                </div>
            </div>
        </div>
        <footer>
            <p>Holberton School</p>
        </footer>
    </body>
</html>
